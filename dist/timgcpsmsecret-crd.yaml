apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: timgcpsmsecrets.secrets.tim.operator
spec:
  group: secrets.tim.operator
  names:
    kind: TimGcpSmSecret
    listKind: TimGcpSmSecretList
    plural: timgcpsmsecrets
    singular: timgcpsmsecret
    shortNames:
      - tgs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - secretId
                - secretName
              properties:
                gcpSmConfig:
                  type: string
                  description: Name of TimGcpSmSecretConfig for default projectId
                gcpSmConfigNamespace:
                  type: string
                  description: Namespace of TimGcpSmSecretConfig
                clusterConfig:
                  type: string
                  description: Name of cluster TimGcpSmClusterConfig for projectId (ignored if projectId or gcpSmConfig is set)
                projectId:
                  type: string
                  description: GCP project ID (or use gcpSmConfig, clusterConfig, or TimGcpSmClusterConfig/default)
                secretId:
                  type: string
                  description: Secret Manager secret id (short name)
                secretVersion:
                  type: string
                  default: latest
                  description: Version id or "latest"
                secretName:
                  type: string
                  description: Kubernetes Secret name to create or update
                deploymentName:
                  type: string
                  description: Deployment to roll when synced data changes
                namespace:
                  type: string
                  description: Namespace for Secret and Deployment (defaults to resource namespace)
                syncInterval:
                  type: string
                  default: "5m"
                  description: Poll interval (e.g. 30s, 5m). Min 30s, max 1h.
                decodeFormat:
                  type: string
                  enum:
                    - text
                    - json
                  default: text
                  description: text = single key; json = parse JSON object into multiple keys
                secretKey:
                  type: string
                  description: Key name when decodeFormat is text (default value)
            status:
              type: object
              properties:
                lastSyncTime:
                  type: string
                  format: date-time
                secretHash:
                  type: string
                retryCount:
                  type: integer
                lastError:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Secret ID
          type: string
          jsonPath: .spec.secretId
        - name: K8s Secret
          type: string
          jsonPath: .spec.secretName
        - name: Sync
          type: string
          jsonPath: .spec.syncInterval
        - name: Retries
          type: integer
          jsonPath: .status.retryCount
        - name: Last Sync
          type: date
          jsonPath: .status.lastSyncTime
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
