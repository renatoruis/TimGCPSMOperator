apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: timgcpsmsecretconfigs.secrets.tim.operator
spec:
  group: secrets.tim.operator
  names:
    kind: TimGcpSmSecretConfig
    listKind: TimGcpSmSecretConfigList
    plural: timgcpsmsecretconfigs
    singular: timgcpsmsecretconfig
    shortNames:
      - tgsc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - projectId
              properties:
                projectId:
                  type: string
                  description: GCP project ID for Secret Manager
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.projectId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
