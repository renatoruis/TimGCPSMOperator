apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: timgcpsmclusterconfigs.secrets.tim.operator
spec:
  group: secrets.tim.operator
  names:
    kind: TimGcpSmClusterConfig
    listKind: TimGcpSmClusterConfigList
    plural: timgcpsmclusterconfigs
    singular: timgcpsmclusterconfig
    shortNames:
      - tgcc
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - projectId
              properties:
                projectId:
                  type: string
                  description: Default GCP project for TimGcpSmSecret when they do not set projectId, gcpSmConfig, or clusterConfig
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.projectId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
