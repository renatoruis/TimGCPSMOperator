# Para GKE: mapear a uma Google Service Account com Workload Identity, por exemplo:
#   kubectl annotate serviceaccount timgcpsm-operator -n timgcpsm-operator-system \
#     iam.gke.io/gcp-service-account=GCP_SA@PROJECT_ID.iam.gserviceaccount.com
# Ver docs/gcp-permissoes.md
